<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipWall Web</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <span class="brand">SHIPWALL</span>
    <nav class="site-nav">
      <a href="index.html" class="site-nav-link">Avions</a>
      <a href="ships.html" class="site-nav-link active">Bateaux</a>
    </nav>
    <div id="status" class="status">Initialisation…</div>
  </header>

  <main class="board-wrap">
    <div class="board" id="board">

      <div class="board-row">
        <button id="prevBtn" class="nav-btn" aria-label="Bateau précédent">‹</button>

        <div class="board-main">
          <div class="callsign" id="shipName">—</div>
          <div class="route" id="destination">—</div>
        </div>

        <button id="nextBtn" class="nav-btn" aria-label="Bateau suivant">›</button>
      </div>

      <div class="meta-grid">
        <div class="meta-cell">
          <div class="meta-label">VITESSE</div>
          <div class="meta-value" id="sog">—</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">CAP (COG)</div>
          <div class="meta-value" id="cog">—</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">CAP RÉEL</div>
          <div class="meta-value" id="heading">—</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">STATUT</div>
          <div class="meta-value" id="navStatus">—</div>
        </div>
      </div>

      <div class="airline" id="shipMeta"></div>

      <div class="dots" id="dots"></div>

      <div class="empty-msg" id="emptyMsg">Recherche de bateaux…</div>
    </div>
  </main>

  <footer class="footer">
    <span id="lastUpdate">—</span> ·
    Centre: <span id="centerInfo">—</span> ·
    Rayon: <span id="radiusInfo">—</span> km
  </footer>

  <!-- 1) Réglages non secrets (position, rayon...) -->
  <script src="config.js"></script>
  <!-- 2) Logique de récupération / affichage des bateaux -->
  <script src="ships-app.js"></script>
</body>
</html>
